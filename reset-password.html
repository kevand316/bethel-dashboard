<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bethel Residency — Set New Password</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #0a0e14;
  --bg2: #111620;
  --bg3: #1a2030;
  --border: #1e2d45;
  --gold: #f0b429;
  --gold-dim: #a07820;
  --green: #2ecc71;
  --red: #e74c3c;
  --text: #e8edf5;
  --text-mid: #8899aa;
  --text-dim: #445566;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 40px 32px;
  width: 100%;
  max-width: 400px;
}

.logo {
  font-family: var(--display);
  font-size: 28px;
  letter-spacing: 0.08em;
  color: var(--gold);
  text-align: center;
  margin-bottom: 4px;
}

.tagline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 36px;
}

h1 {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-mid);
  margin-bottom: 24px;
  text-align: center;
}

.field { margin-bottom: 16px; }

label {
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-mid);
  margin-bottom: 6px;
}

input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}

input:focus { border-color: var(--gold-dim); }

button[type="submit"] {
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: 4px;
  color: #0a0e14;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  margin-top: 8px;
  padding: 12px;
  text-transform: uppercase;
  transition: background 0.15s, opacity 0.15s;
}

button[type="submit"]:hover:not(:disabled) { background: #d9a020; }
button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

.error-msg {
  background: rgba(231, 76, 60, 0.12);
  border: 1px solid rgba(231, 76, 60, 0.35);
  border-radius: 4px;
  color: var(--red);
  font-family: var(--mono);
  font-size: 12px;
  margin-top: 16px;
  padding: 10px 12px;
  display: none;
}

.error-msg.visible { display: block; }

.invalid-link {
  text-align: center;
  display: none;
}

.invalid-link p {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-mid);
  margin-bottom: 16px;
}

.invalid-link a {
  color: var(--gold-dim);
  text-decoration: none;
  font-family: var(--mono);
  font-size: 12px;
}

.invalid-link a:hover { color: var(--gold); }

.footer {
  margin-top: 24px;
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.footer a {
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s;
}

.footer a:hover { color: var(--text-mid); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Bethel Residency</div>
  <div class="tagline">Operations Dashboard</div>

  <!-- Shown while Supabase processes the reset token from the URL hash -->
  <div id="loading-view">
    <h1>Verifying link…</h1>
  </div>

  <!-- Shown if the token is missing or expired -->
  <div class="invalid-link" id="invalid-view">
    <p>This reset link has expired or is invalid.</p>
    <a href="/login.html">← Back to sign in</a>
  </div>

  <!-- Shown once the token is valid -->
  <div id="form-view" style="display:none">
    <h1>Set New Password</h1>
    <form id="reset-form" autocomplete="off">
      <div class="field">
        <label for="new-password">New Password</label>
        <input id="new-password" type="password" placeholder="At least 8 characters" required minlength="8">
      </div>
      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" type="password" placeholder="Repeat password" required minlength="8">
      </div>
      <button type="submit" id="submit-btn">Set Password</button>
      <div class="error-msg" id="form-error"></div>
    </form>
  </div>
</div>

<div class="footer">
  Need help? <a href="mailto:info@bethelresidency.com">Contact support</a>
</div>

<script>
(function () {
  const SUPABASE_URL = 'https://yqgccykbdihsjqlapghr.supabase.co';
  const SUPABASE_ANON_KEY =
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' +
    'eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxZ2NjeWtiZGloc2pxbGFwZ2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDAyMTksImV4cCI6MjA4NzkxNjIxOX0.' +
    'XHgok8xbYDKekprYI2htAZL622P7YcycTsQ5HuP-VUs';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function show(id) {
    ['loading-view', 'invalid-view', 'form-view'].forEach((v) => {
      document.getElementById(v).style.display = v === id ? (v === 'invalid-view' ? 'block' : 'block') : 'none';
    });
  }

  // Supabase puts the session tokens in the URL hash when the user clicks the
  // reset link in their email. onAuthStateChange fires with PASSWORD_RECOVERY.
  client.auth.onAuthStateChange(async (event) => {
    if (event === 'PASSWORD_RECOVERY') {
      show('form-view');
    } else if (event === 'SIGNED_IN') {
      // If already signed in (somehow) and no recovery, go to dashboard.
      window.location.href = '/';
    }
  });

  // If there's no hash fragment or it doesn't contain a token, show invalid.
  // Give onAuthStateChange a moment to fire first.
  setTimeout(() => {
    const formVisible = document.getElementById('form-view').style.display !== 'none';
    const loadingVisible = document.getElementById('loading-view').style.display !== 'none';
    if (loadingVisible && !formVisible) {
      // Still on loading screen after 2s — token likely missing or expired.
      show('invalid-view');
    }
  }, 2000);

  // ── Set new password form ──────────────────────────────────────────────────
  const form      = document.getElementById('reset-form');
  const submitBtn = document.getElementById('submit-btn');
  const formErr   = document.getElementById('form-error');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formErr.classList.remove('visible');

    const newPw  = document.getElementById('new-password').value;
    const confPw = document.getElementById('confirm-password').value;

    if (newPw !== confPw) {
      formErr.textContent = 'Passwords do not match.';
      formErr.classList.add('visible');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';

    const { error } = await client.auth.updateUser({ password: newPw });

    if (error) {
      formErr.textContent = error.message;
      formErr.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Set Password';
      return;
    }

    // Password updated. Sign out, then send to login with a fresh slate.
    await client.auth.signOut();
    window.location.href = '/login.html';
  });
})();
</script>
</body>
</html>
